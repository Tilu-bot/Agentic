<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agentic Chat</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Root ── */
html, body {
  background: #0f1117;
  color: #e2e8f0;
  font-family: "Segoe UI", "Inter", "SF Pro Text", "Helvetica Neue", sans-serif;
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
  height: 100%;
}

/* ── Message list ── */
#messages {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 28px 24px 40px;
  min-height: 100%;
}

/* ── Empty / welcome state ── */
#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  min-height: 60vh;
  text-align: center;
  color: #475569;
  animation: fadeIn 0.4s ease;
}
#welcome .logo { font-size: 52px; filter: drop-shadow(0 0 12px #6366f180); }
#welcome h2 { font-size: 24px; font-weight: 700; color: #94a3b8; }
#welcome p  { font-size: 14px; max-width: 380px; color: #64748b; }
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
.chip {
  background: #1e2235;
  border: 1px solid #2d3149;
  border-radius: 20px;
  padding: 7px 16px;
  font-size: 13px;
  color: #94a3b8;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.chip:hover { background: #312e81; border-color: #4f46e5; color: #c7d2fe; }

/* ── Message row ── */
.msg { display: flex; flex-direction: column; animation: fadeUp 0.2s ease; max-width: 100%; }

@keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
@keyframes fadeUp  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ── Avatars / meta row ── */
.meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.meta .role-label { font-size: 12px; font-weight: 600; letter-spacing: 0.4px; }
.msg.user .meta { flex-direction: row-reverse; }
.msg.user .role-label   { color: #818cf8; }
.msg.assistant .role-label { color: #34d399; }
.msg.system .role-label { color: #f59e0b; }

/* ── Bubbles ── */
.bubble {
  display: inline-block;
  padding: 12px 16px;
  border-radius: 14px;
  word-break: break-word;
  overflow-wrap: break-word;
  max-width: 85%;
  font-size: 15px;
}

.msg.user     { align-items: flex-end; }
.msg.user     .bubble {
  background: linear-gradient(135deg, #312e81 0%, #3730a3 100%);
  color: #e0e7ff;
  border-bottom-right-radius: 4px;
}

.msg.assistant { align-items: flex-start; }
.msg.assistant .bubble {
  background: #1e2235;
  color: #e2e8f0;
  border-bottom-left-radius: 4px;
  border: 1px solid #2d3149;
}

.msg.system   { align-items: flex-start; }
.msg.system   .bubble {
  background: #1c2a24;
  color: #6ee7b7;
  border-left: 3px solid #10b981;
  border-radius: 8px;
  font-size: 13px;
  font-style: italic;
  white-space: pre-wrap;
}

.msg.info     { align-items: center; }
.msg.info     .bubble {
  background: transparent;
  color: #475569;
  font-size: 12px;
  font-style: italic;
  border: none;
  padding: 2px 8px;
}

/* ── Timestamp ── */
.ts { font-size: 11px; color: #334155; margin-top: 3px; }
.msg.user .ts { text-align: right; }

/* ── Streaming cursor ── */
.cursor {
  display: inline-block;
  width: 2px; height: 1em;
  background: #6366f1;
  border-radius: 1px;
  vertical-align: text-bottom;
  margin-left: 2px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Reasoning prefix ── */
.reasoning { font-size: 12px; color: #475569; font-style: italic; margin-bottom: 4px; }

/* ── Markdown: code blocks ── */
.pre-wrap { position: relative; }
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #252840;
  color: #94a3b8;
  border: 1px solid #2d3149;
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s, background 0.15s, color 0.15s;
}
.pre-wrap:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: #312e81; color: #c7d2fe; border-color: #4f46e5; }
pre {
  background: #0d1017;
  border: 1px solid #2d3149;
  border-radius: 8px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 10px 0;
  font-size: 13px;
  line-height: 1.55;
}
code {
  font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", "Consolas", "Monaco", monospace;
  font-size: 13px;
}
:not(pre) > code {
  background: #252840;
  padding: 2px 6px;
  border-radius: 4px;
  color: #c7d2fe;
  font-size: 93%;
}

/* ── Light theme overrides ── */
body.light { background: #f8fafc; color: #1e293b; }
body.light .msg.user .role-label   { color: #4f46e5; }
body.light .msg.assistant .role-label { color: #059669; }
body.light .msg.system .role-label { color: #d97706; }
body.light .msg.user .bubble {
  background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
  color: #f8fafc;
}
body.light .msg.assistant .bubble {
  background: #f1f5f9;
  color: #1e293b;
  border: 1px solid #cbd5e1;
}
body.light .msg.system .bubble {
  background: #ecfdf5;
  color: #065f46;
  border-left: 3px solid #10b981;
}
body.light .msg.info .bubble { color: #94a3b8; }
body.light pre { background: #f1f5f9; border-color: #cbd5e1; color: #1e293b; }
body.light :not(pre) > code { background: #e2e8f0; color: #4338ca; }
body.light .chip { background: #f1f5f9; border-color: #cbd5e1; color: #475569; }
body.light .chip:hover { background: #ede9fe; border-color: #6366f1; color: #4338ca; }
body.light .welcome { color: #94a3b8; }
body.light .copy-btn { background: #e2e8f0; color: #475569; border-color: #cbd5e1; }
body.light .copy-btn:hover { background: #ede9fe; color: #4338ca; border-color: #6366f1; }
body.light h1, body.light h2, body.light h3 { color: #1e293b; }
body.light strong { color: #1e293b; }
body.light em { color: #4338ca; }
body.light a { color: #4f46e5; }
body.light a:hover { color: #4338ca; }
body.light blockquote { color: #475569; border-color: #6366f1; }
body.light th { background: #e2e8f0; color: #475569; }
body.light td { border-color: #f1f5f9; }
body.light #welcome { color: #94a3b8; }
body.light #welcome h2 { color: #475569; }
body.light #welcome p { color: #94a3b8; }

/* ── Markdown: text ── */
h1 { font-size: 20px; color: #c7d2fe; margin: 14px 0 6px; }
h2 { font-size: 17px; color: #c7d2fe; margin: 12px 0 5px; }
h3 { font-size: 15px; color: #c7d2fe; margin: 10px 0 4px; }
p  { margin: 5px 0; }
ul, ol { margin: 6px 0; padding-left: 22px; }
li { margin: 3px 0; }
a  { color: #818cf8; text-decoration: underline; text-underline-offset: 2px; }
a:hover { color: #a5b4fc; }
blockquote {
  border-left: 3px solid #4f46e5;
  margin: 8px 0;
  padding: 4px 14px;
  color: #94a3b8;
  font-style: italic;
}
hr {
  border: none;
  border-top: 1px solid #2d3149;
  margin: 14px 0;
}
strong { color: #e0e7ff; font-weight: 700; }
em     { color: #c4b5fd; font-style: italic; }

table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
th { background: #252840; color: #94a3b8; font-weight: 600; padding: 7px 12px; text-align: left; border-bottom: 1px solid #2d3149; }
td { padding: 7px 12px; border-bottom: 1px solid #1e2235; }
tr:last-child td { border-bottom: none; }
</style>
</head>
<body>
<div id="messages">
  <div id="welcome">
    <div class="logo">✦</div>
    <h2>Agentic</h2>
    <p>Your local AI assistant. Powered by the Reactive Cortex Architecture — no cloud, no API keys.</p>
    <div class="chip-row" id="welcome-chips"></div>
  </div>
</div>

<script>
"use strict";

/* ── State ── */
var _currentMsgId   = null;
var _currentRawText = "";
var _msgCounter     = 0;
var _suggestionCb   = null;   // set by Python via window._suggestionCallback

/* ── Suggestion chips (single source of truth) ── */
var _SUGGESTIONS = [
  "What can you do?",
  "List available tools",
  "Help me write some code",
  "Search the web for me",
];

function _buildChips(container) {
  container.innerHTML = "";
  _SUGGESTIONS.forEach(function(s) {
    var d = document.createElement("div");
    d.className = "chip";
    d.textContent = s;
    d.onclick = function() { sendSuggestion(s); };
    container.appendChild(d);
  });
}

// Populate initial welcome chips on load
_buildChips(document.getElementById("welcome-chips"));

/* ── Helpers ── */
function _esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;")
          .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function _ts() {
  var d = new Date();
  return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
}

function _scroll() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

function _hideWelcome() {
  var w = document.getElementById("welcome");
  if (w) { w.style.animation = "none"; w.remove(); }
}

/* ── Inline markdown ── */
function _inline(t) {
  // Bold
  t = t.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
  t = t.replace(/__([^_\n]+)__/g,     "<strong>$1</strong>");
  // Italic
  t = t.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
  t = t.replace(/_([^_\n]+)_/g,   "<em>$1</em>");
  // Inline code
  t = t.replace(/`([^`\n]+)`/g, function(_,c){ return "<code>"+_esc(c)+"</code>"; });
  // Links
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  return t;
}

function _codeBlock(lang, lines) {
  var cls = lang ? ' class="language-'+_esc(lang)+'"' : "";
  return (
    '<div class="pre-wrap"><pre><code'+cls+'>' +
    _esc(lines.join("\n")) +
    '</code></pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>'
  );
}

function _renderMarkdown(text) {
  var lines      = text.split("\n");
  var out        = [];
  var inCode     = false;
  var codeLang   = "";
  var codeAcc    = [];
  var inUl       = false;
  var inOl       = false;
  var inTable    = false;
  var tableRows  = [];

  function closeLists() {
    if (inUl) { out.push("</ul>"); inUl = false; }
    if (inOl) { out.push("</ol>"); inOl = false; }
  }
  function closeTable() {
    if (inTable) {
      out.push("<table>" + tableRows.join("") + "</table>");
      inTable = false;
      tableRows = [];
    }
  }
  function closeAll() { closeLists(); closeTable(); }
  function openUl() { if (!inUl) { closeTable(); if(inOl){out.push("</ol>");inOl=false;} out.push("<ul>"); inUl=true; } }
  function openOl() { if (!inOl) { closeTable(); if(inUl){out.push("</ul>");inUl=false;} out.push("<ol>"); inOl=true; } }

  for (var i = 0; i < lines.length; i++) {
    var L = lines[i];

    /* code fence */
    if (L.startsWith("```")) {
      if (!inCode) {
        closeAll();
        inCode = true; codeLang = L.slice(3).trim(); codeAcc = [];
      } else {
        inCode = false;
        out.push(_codeBlock(codeLang, codeAcc));
      }
      continue;
    }
    if (inCode) { codeAcc.push(L); continue; }

    /* headers */
    if (L.startsWith("### ")) { closeAll(); out.push("<h3>"+_inline(L.slice(4))+"</h3>"); continue; }
    if (L.startsWith("## "))  { closeAll(); out.push("<h2>"+_inline(L.slice(3))+"</h2>"); continue; }
    if (L.startsWith("# "))   { closeAll(); out.push("<h1>"+_inline(L.slice(2))+"</h1>"); continue; }

    /* hr */
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(L.trim())) { closeAll(); out.push("<hr>"); continue; }

    /* blockquote */
    if (L.startsWith("> ")) { closeAll(); out.push("<blockquote>"+_inline(L.slice(2))+"</blockquote>"); continue; }

    /* table row */
    if (L.startsWith("|") && L.endsWith("|")) {
      closeLists();
      /* separator row — promote the preceding row's <td> to <th> */
      if (/^\|[-:| ]+\|$/.test(L)) {
        if (tableRows.length > 0) {
          tableRows[tableRows.length - 1] =
            tableRows[tableRows.length - 1]
              .replace(/<td>/g, "<th>").replace(/<\/td>/g, "</th>");
        }
        continue;
      }
      var cells = L.slice(1,-1).split("|").map(function(c){ return c.trim(); });
      var rowHtml = "<tr>" + cells.map(function(c){ return "<td>"+_inline(c)+"</td>"; }).join("") + "</tr>";
      inTable = true;
      tableRows.push(rowHtml);
      continue;
    }

    /* unordered list */
    var ulm = L.match(/^([-*+]) (.+)/);
    if (ulm) { openUl(); out.push("<li>"+_inline(ulm[2])+"</li>"); continue; }

    /* ordered list */
    var olm = L.match(/^\d+\. (.+)/);
    if (olm) { openOl(); out.push("<li>"+_inline(olm[1])+"</li>"); continue; }

    closeAll();
    if (L.trim() === "") {
      out.push("<br>");
    } else {
      out.push("<p>"+_inline(L)+"</p>");
    }
  }

  closeAll();
  if (inCode && codeAcc.length) {
    out.push(_codeBlock(codeLang, codeAcc));
  }
  return out.join("");
}

/* ── Public API (called by Python via runJavaScript) ── */

window.addUserMessage = function(text) {
  _hideWelcome();
  _msgCounter++;
  var id  = "msg-"+_msgCounter;
  var div = document.createElement("div");
  div.className = "msg user"; div.id = id;
  div.innerHTML =
    '<div class="meta"><span class="role-label">You</span></div>' +
    '<div class="bubble">'+_esc(text)+'</div>' +
    '<div class="ts">'+_ts()+'</div>';
  document.getElementById("messages").appendChild(div);
  _scroll();
};

window.addAssistantMessage = function(text) {
  _hideWelcome();
  _msgCounter++;
  var id = "msg-" + _msgCounter;
  var div = document.createElement("div");
  div.className = "msg assistant";
  div.id = id;
  div.innerHTML =
    '<div class="meta"><span class="role-label">Agentic</span></div>' +
    '<div class="bubble">' + _renderMarkdown(text || "") + '</div>' +
    '<div class="ts">' + _ts() + '</div>';
  document.getElementById("messages").appendChild(div);
  _scroll();
};

window.beginAssistantMessage = function() {
  _hideWelcome();
  _currentRawText = "";
  _msgCounter++;
  _currentMsgId = "msg-"+_msgCounter;
  var div = document.createElement("div");
  div.className = "msg assistant"; div.id = _currentMsgId;
  div.innerHTML =
    '<div class="meta"><span class="role-label">Agentic</span></div>' +
    '<div class="bubble" id="'+_currentMsgId+'-b"><span class="cursor"></span></div>';
  document.getElementById("messages").appendChild(div);
  _scroll();
};

window.appendTokens = function(text) {
  if (!_currentMsgId) return;
  _currentRawText += text;
  var b = document.getElementById(_currentMsgId+"-b");
  if (!b) return;
  // Show raw text + cursor during streaming (fast, no re-render)
  b.textContent = _currentRawText;
  var cur = document.createElement("span");
  cur.className = "cursor";
  b.appendChild(cur);
  _scroll();
};

window.finishStreaming = function() {
  if (!_currentMsgId) return;
  var b   = document.getElementById(_currentMsgId+"-b");
  var msg = document.getElementById(_currentMsgId);
  if (b && _currentRawText) {
    b.innerHTML = _renderMarkdown(_currentRawText);
  }
  if (msg) {
    var ts = document.createElement("div");
    ts.className = "ts"; ts.textContent = _ts();
    msg.appendChild(ts);
  }
  _currentMsgId   = null;
  _currentRawText = "";
  _scroll();
};

window.addSystemMessage = function(text) {
  _hideWelcome();
  _msgCounter++;
  var div = document.createElement("div");
  div.className = "msg system";
  div.innerHTML = '<div class="meta"><span class="role-label">System</span></div><div class="bubble">'+_esc(text)+'</div>';
  document.getElementById("messages").appendChild(div);
  _scroll();
};

window.addInfoMessage = function(text) {
  _msgCounter++;
  var div = document.createElement("div");
  div.className = "msg info";
  div.innerHTML = '<div class="bubble">'+_esc(text)+'</div>';
  document.getElementById("messages").appendChild(div);
  _scroll();
};

window.clearMessages = function() {
  var c = document.getElementById("messages");
  c.innerHTML = "";
  var w = document.createElement("div");
  w.id = "welcome";
  var chips = document.createElement("div");
  chips.className = "chip-row";
  _buildChips(chips);
  w.innerHTML =
    '<div class="logo">✦</div><h2>Agentic</h2>' +
    '<p>Your local AI assistant. No cloud, no API keys.</p>';
  w.appendChild(chips);
  c.appendChild(w);
  _currentMsgId = null; _currentRawText = "";
};

window.sendSuggestion = function(text) {
  if (window._suggestionCallback) {
    window._suggestionCallback(text);
  }
};

/* ── Copy code ── */
window.copyCode = function(btn) {
  var code = btn.parentElement.querySelector("pre code");
  if (!code) return;
  var text = code.textContent;
  function _done() { btn.textContent = "Copied!"; setTimeout(function(){ btn.textContent = "Copy"; }, 1500); }
  if (navigator && navigator.clipboard) {
    navigator.clipboard.writeText(text).then(_done).catch(function() {
      _fallbackCopy(text, _done);
    });
  } else {
    _fallbackCopy(text, _done);
  }
};

function _fallbackCopy(text, cb) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;opacity:0;top:0;left:0;";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

/* ── Theme switching ── */
window.setTheme = function(t) {
  document.body.className = (t === "light") ? "light" : "";
};
</script>
</body>
</html>
